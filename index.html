<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wallpapers</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #66fcf1;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #c5c6c7;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #1f2833;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            border: 1px solid #45f3ff33;
        }
        .card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .btn {
            display: block;
            background: linear-gradient(45deg, #1f4068, #16c79a);
            color: white;
            text-decoration: none;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <h1>Premium Wallpaper Hub</h1>
    <p>Tap on download to get high quality wallpapers</p>

    <div class="grid">
        <!-- Card 1 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" alt="Wallpaper">
            <a href="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1000" download class="btn">Download HD</a>
        </div>
        <!-- Card 2 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=500" alt="Wallpaper">
            <a href="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=1000" download class="btn">Download HD</a>
        </div>
    </div>

</body>
</html>
